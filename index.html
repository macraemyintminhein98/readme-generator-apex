<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX README Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* Custom styles can go here if needed, but keeping it minimal for 150 lines */
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-2xl text-center">
        <h1 class="text-4xl font-bold mb-4 text-gray-800">APEX README Generator</h1>
        <p class="text-xl text-gray-600 mb-6">Craft perfect GitHub READMEs in minutes.</p>
        
        <div class="space-y-4">
            <input type="text" placeholder="Project Name" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            <textarea placeholder="Project Description" rows="3" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            <select class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Select Template (V2)</option>
            </select>
            <div class="flex items-center space-x-2">
                <input type="checkbox" id="badge1" class="form-checkbox h-5 w-5 text-blue-600">
                <label for="badge1" class="text-gray-700">Add Badge (V2)</label>
            </div>
        </div>

        <button disabled class="mt-8 w-full bg-blue-400 text-white p-3 rounded-lg text-lg font-semibold cursor-not-allowed">
            Generate README (Coming Soon)
        </button>
        <p class="mt-4 text-md text-gray-500">Early Access in V2. Stay tuned!</p>

        <div class="mt-8 border-t pt-6 text-gray-500 text-sm">
            <p>&copy; 2023 APEX Products. All rights reserved.</p>
            <p class="mt-2">Powered by APEX.</p>
        </div>
    </div>
</body>
</html>
